name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Immutable image tag to deploy (use sha-<commit>)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  APP_URL: https://gshs.app

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://gshs.app
    steps:
      - uses: actions/checkout@v4
      - name: Validate image tag
        shell: bash
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          case "$IMAGE_TAG" in
            sha-*) ;;
            *)
              echo "image_tag must use the immutable sha-<commit> format." >&2
              exit 1
              ;;
          esac
      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts
      - name: Sync deploy assets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH' '$DEPLOY_PATH/data' '$DEPLOY_PATH/backup'"
          scp -i ~/.ssh/id_ed25519 -P "$DEPLOY_PORT" deploy/compose.yml deploy/deploy.sh "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
          ssh -i ~/.ssh/id_ed25519 -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && sed -i 's/\r$//' compose.yml deploy.sh && chmod +x deploy.sh"
      - name: Deploy production server
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "
            cd '$DEPLOY_PATH' &&
            export DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' &&
            export DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' &&
            export IMAGE_TAG='$IMAGE_TAG' &&
            export APP_VERSION='$IMAGE_TAG' &&
            export DOCKER_IMAGE='${DOCKERHUB_USERNAME}/gshsapp' &&
            ./deploy.sh
          "

  smoke:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4
      - name: Smoke check production deployment
        shell: bash
        env:
          APP_URL: ${{ env.APP_URL }}
          EXPECTED_VERSION: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          python deploy/smoke_check.py "$APP_URL" "$EXPECTED_VERSION"
