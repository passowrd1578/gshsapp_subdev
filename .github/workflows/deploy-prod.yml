name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Immutable image tag to deploy (use sha-<commit>)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  APP_URL: https://gshs.app
  E2E_BASE_URL: https://gshs.app
  DEPLOY_PATH: /opt/gshsapp
  BACKUP_MAX_AGE_HOURS: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on:
      - self-hosted
      - Linux
      - X64
      - gshs-prod
    environment:
      name: production
      url: https://gshs.app
    steps:
      - uses: actions/checkout@v5
      - name: Validate image tag
        shell: bash
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          case "$IMAGE_TAG" in
            sha-*) ;;
            *)
              echo "image_tag must use the immutable sha-<commit> format." >&2
              exit 1
              ;;
          esac
      - name: Sync deploy assets on production server
        shell: bash
        run: |
          set -euo pipefail
          install -d "$DEPLOY_PATH" "$DEPLOY_PATH/data" "$DEPLOY_PATH/backup"
          install -m 644 deploy/compose.yml "$DEPLOY_PATH/compose.yml"
          install -m 755 deploy/deploy.sh "$DEPLOY_PATH/deploy.sh"
          install -m 755 deploy/offsite-backup.sh "$DEPLOY_PATH/offsite-backup.sh"
          install -m 755 deploy/run-scheduled-backup.sh "$DEPLOY_PATH/run-scheduled-backup.sh"
          install -m 755 deploy/restore-drill.sh "$DEPLOY_PATH/restore-drill.sh"
      - name: Deploy production server
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          BACKUP_MAX_AGE_HOURS: ${{ env.BACKUP_MAX_AGE_HOURS }}
        run: |
          set -euo pipefail
          cd "$DEPLOY_PATH"
          export DOCKERHUB_USERNAME="$DOCKERHUB_USERNAME"
          export DOCKERHUB_TOKEN="$DOCKERHUB_TOKEN"
          export IMAGE_TAG="$IMAGE_TAG"
          export APP_VERSION="$IMAGE_TAG"
          export BACKUP_MAX_AGE_HOURS="$BACKUP_MAX_AGE_HOURS"
          export DOCKER_IMAGE="${DOCKERHUB_USERNAME}/gshsapp"
          ./deploy.sh

  smoke:
    runs-on:
      - self-hosted
      - Linux
      - X64
      - gshs-prod
    needs: deploy
    outputs:
      health_version: ${{ steps.smoke.outputs.health_version }}
    steps:
      - id: smoke
        name: Smoke check production deployment on server
        shell: bash
        env:
          EXPECTED_VERSION: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          health_version="$(
          EXPECTED_VERSION="$EXPECTED_VERSION" python3 - <<'PY'
          import json
          import os
          import urllib.request

          base_url = "http://127.0.0.1:1234"
          expected_version = os.environ["EXPECTED_VERSION"]
          paths = ["/api/health", "/", "/menu", "/notices"]

          for path in paths:
              request = urllib.request.Request(
                  base_url + path,
                  headers={"User-Agent": "gshsapp-ci-smoke-check"},
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  body = response.read()
                  status = response.status

              if status < 200 or status >= 400:
                  raise SystemExit(f"{path} returned status {status}")

              if path == "/api/health":
                  payload = json.loads(body.decode("utf-8"))
                  if payload.get("ok") is not True:
                      raise SystemExit(f"Health endpoint returned unhealthy payload: {payload}")
                  if payload.get("service") != "gshsapp":
                      raise SystemExit(f"Unexpected service name: {payload}")
                  if payload.get("version") != expected_version:
                      raise SystemExit(
                          f"Health endpoint version mismatch: expected {expected_version}, got {payload.get('version')}"
                      )

          print(payload["version"])
          PY
          )"

          echo "health_version=$health_version" >> "$GITHUB_OUTPUT"

  e2e:
    runs-on: ubuntu-latest
    needs:
      - deploy
      - smoke
    environment:
      name: production
      url: ${{ env.APP_URL }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Wait for production domain to serve deployed version
        shell: bash
        env:
          EXPECTED_VERSION: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          EXPECTED_VERSION="$EXPECTED_VERSION" E2E_BASE_URL="$E2E_BASE_URL" python3 - <<'PY'
          import json
          import os
          import time
          import urllib.request

          base_url = os.environ["E2E_BASE_URL"].rstrip("/")
          expected_version = os.environ["EXPECTED_VERSION"]
          deadline = time.time() + 180

          while time.time() < deadline:
              request = urllib.request.Request(
                  base_url + "/api/health",
                  headers={"User-Agent": "gshsapp-production-e2e"},
              )
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      payload = json.loads(response.read().decode("utf-8"))
                  if payload.get("version") == expected_version and payload.get("ok") is True:
                      break
              except Exception:
                  pass
              time.sleep(5)
          else:
              raise SystemExit(
                  f"Timed out waiting for {base_url}/api/health to report version {expected_version}"
              )
          PY
      - name: Run production Playwright smoke suite
        env:
          E2E_BASE_URL: ${{ env.E2E_BASE_URL }}
          E2E_ADMIN_USER: ${{ secrets.E2E_ADMIN_USER }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
        run: npm run test:e2e:smoke
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-production-${{ github.run_id }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  report:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - deploy
      - smoke
      - e2e
    steps:
      - name: Write production deployment summary
        shell: bash
        env:
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          SMOKE_RESULT: ${{ needs.smoke.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          HEALTH_VERSION: ${{ needs.smoke.outputs.health_version }}
        run: |
          set -euo pipefail
          {
            echo "## Production Deployment"
            echo
            echo "- Deployment SHA: $IMAGE_TAG"
            echo "- Health version: ${HEALTH_VERSION:-n/a}"
            echo "- Deploy result: $DEPLOY_RESULT"
            echo "- Smoke result: $SMOKE_RESULT"
            echo "- Playwright smoke result: $E2E_RESULT"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$DEPLOY_RESULT" != "success" || "$SMOKE_RESULT" != "success" || "$E2E_RESULT" != "success" ]]; then
            exit 1
          fi
