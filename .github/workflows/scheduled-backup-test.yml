name: Scheduled Backup Test

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scheduled-backup-test
  cancel-in-progress: false

env:
  DEPLOY_PATH: /opt/gshsapp

jobs:
  backup:
    runs-on:
      - self-hosted
      - Linux
      - X64
      - gshs-test
    environment:
      name: test
      url: https://test.gshs.app
    steps:
      - name: Run scheduled backup on test server
        shell: bash
        run: |
          set -euo pipefail
          cd "$DEPLOY_PATH"
          ./run-scheduled-backup.sh
