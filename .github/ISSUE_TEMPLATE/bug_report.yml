name: Bug report
about: 버그를 제보합니다.
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 문제 요약
      description: 어떤 문제가 발생했는지 간단히 작성해주세요.
      placeholder: 예) 캘린더 1~2월 일정이 표시되지 않습니다.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 절차
      description: 재현 가능한 순서대로 적어주세요.
      placeholder: |
        1. /calendar 접속
        2. 2026년 1월 이동
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 결과
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: 환경 정보
      placeholder: ex) macOS 14 / Chrome 122 / production

  - type: textarea
    id: logs
    attributes:
      label: 로그/스크린샷
      description: 가능한 경우 첨부해주세요.
