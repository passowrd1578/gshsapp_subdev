name: Publish And Deploy Test

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-test
  cancel-in-progress: true

env:
  AUTH_SECRET: ci-auth-secret
  AUTH_TRUST_HOST: "true"
  AUTH_URL: http://localhost:3000
  NEXTAUTH_URL: http://localhost:3000
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  DATABASE_URL: file:./prisma/dev.db
  NEXT_PUBLIC_NEIS_API_KEY: ""
  IMAGE_TAG: sha-${{ github.sha }}
  DEPLOY_PATH: /opt/gshsapp
  E2E_BASE_URL: https://test.gshs.app
  BACKUP_MAX_AGE_HOURS: "24"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  publish:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ env.IMAGE_TAG }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gshsapp:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/gshsapp:main
            ${{ secrets.DOCKERHUB_USERNAME }}/gshsapp:latest

  deploy:
    runs-on:
      - self-hosted
      - Linux
      - X64
      - gshs-test
    needs: publish
    environment:
      name: test
      url: https://test.gshs.app
    steps:
      - uses: actions/checkout@v5
      - name: Sync deploy assets on test server
        shell: bash
        run: |
          set -euo pipefail
          install -d "$DEPLOY_PATH" "$DEPLOY_PATH/data" "$DEPLOY_PATH/backup"
          install -m 644 deploy/compose.yml "$DEPLOY_PATH/compose.yml"
          install -m 755 deploy/deploy.sh "$DEPLOY_PATH/deploy.sh"
          install -m 755 deploy/restore-drill.sh "$DEPLOY_PATH/restore-drill.sh"
      - name: Deploy test server
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          BACKUP_MAX_AGE_HOURS: ${{ env.BACKUP_MAX_AGE_HOURS }}
        run: |
          set -euo pipefail
          cd "$DEPLOY_PATH"
          export DOCKERHUB_USERNAME="$DOCKERHUB_USERNAME"
          export DOCKERHUB_TOKEN="$DOCKERHUB_TOKEN"
          export IMAGE_TAG="$IMAGE_TAG"
          export APP_VERSION="$IMAGE_TAG"
          export BACKUP_MAX_AGE_HOURS="$BACKUP_MAX_AGE_HOURS"
          export DOCKER_IMAGE="${DOCKERHUB_USERNAME}/gshsapp"
          ./deploy.sh

  smoke:
    runs-on:
      - self-hosted
      - Linux
      - X64
      - gshs-test
    needs: deploy
    steps:
      - name: Smoke check test deployment on server
        shell: bash
        env:
          EXPECTED_VERSION: ${{ env.IMAGE_TAG }}
        run: |
          set -euo pipefail
          EXPECTED_VERSION="$EXPECTED_VERSION" python3 - <<'PY'
          import json
          import os
          import urllib.request

          base_url = 'http://127.0.0.1:1234'
          expected_version = os.environ['EXPECTED_VERSION']
          paths = ['/api/health', '/', '/menu', '/notices']

          for path in paths:
              request = urllib.request.Request(
                  base_url + path,
                  headers={'User-Agent': 'gshsapp-ci-smoke-check'},
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  body = response.read()
                  status = response.status

              if status < 200 or status >= 400:
                  raise SystemExit(f'{path} returned status {status}')

              if path == '/api/health':
                  payload = json.loads(body.decode('utf-8'))
                  if payload.get('ok') is not True:
                      raise SystemExit(f'Health endpoint returned unhealthy payload: {payload}')
                  if payload.get('service') != 'gshsapp':
                      raise SystemExit(f'Unexpected service name: {payload}')
                  if payload.get('version') != expected_version:
                      raise SystemExit(
                          f"Health endpoint version mismatch: expected {expected_version}, got {payload.get('version')}"
                      )
          PY

  e2e:
    runs-on: ubuntu-latest
    needs: smoke
    environment:
      name: test
      url: ${{ env.E2E_BASE_URL }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Wait for test domain to serve deployed version
        shell: bash
        env:
          EXPECTED_VERSION: ${{ env.IMAGE_TAG }}
        run: |
          set -euo pipefail
          EXPECTED_VERSION="$EXPECTED_VERSION" E2E_BASE_URL="$E2E_BASE_URL" python3 - <<'PY'
          import json
          import os
          import time
          import urllib.request

          base_url = os.environ["E2E_BASE_URL"].rstrip("/")
          expected_version = os.environ["EXPECTED_VERSION"]
          deadline = time.time() + 180

          while time.time() < deadline:
              request = urllib.request.Request(
                  base_url + "/api/health",
                  headers={"User-Agent": "gshsapp-ci-e2e-check"},
              )
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      payload = json.loads(response.read().decode("utf-8"))
                  if payload.get("version") == expected_version and payload.get("ok") is True:
                      break
              except Exception:
                  pass
              time.sleep(5)
          else:
              raise SystemExit(
                  f"Timed out waiting for {base_url}/api/health to report version {expected_version}"
              )
          PY
      - name: Run Playwright E2E suite
        env:
          E2E_BASE_URL: ${{ env.E2E_BASE_URL }}
          E2E_ADMIN_USER: ${{ secrets.E2E_ADMIN_USER }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-test-${{ github.run_id }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
