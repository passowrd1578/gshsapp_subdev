name: Publish And Deploy Test

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-test
  cancel-in-progress: true

env:
  AUTH_SECRET: ci-auth-secret
  AUTH_TRUST_HOST: "true"
  AUTH_URL: http://localhost:3000
  NEXTAUTH_URL: http://localhost:3000
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  DATABASE_URL: file:./prisma/dev.db
  NEXT_PUBLIC_NEIS_API_KEY: ""
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  publish:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ env.IMAGE_TAG }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gshsapp:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/gshsapp:main
            ${{ secrets.DOCKERHUB_USERNAME }}/gshsapp:latest

  deploy:
    runs-on: ubuntu-latest
    needs: publish
    environment:
      name: test
      url: https://test.gshs.app
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts
      - name: Sync deploy assets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH' '$DEPLOY_PATH/data' '$DEPLOY_PATH/backup'"
          scp -i ~/.ssh/id_ed25519 -P "$DEPLOY_PORT" deploy/compose.yml deploy/deploy.sh "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
          ssh -i ~/.ssh/id_ed25519 -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && sed -i 's/\r$//' compose.yml deploy.sh && chmod +x deploy.sh"
      - name: Deploy test server
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "
            cd '$DEPLOY_PATH' &&
            export DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' &&
            export DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' &&
            export IMAGE_TAG='$IMAGE_TAG' &&
            export APP_VERSION='$IMAGE_TAG' &&
            export DOCKER_IMAGE='${DOCKERHUB_USERNAME}/gshsapp' &&
            ./deploy.sh
          "

  smoke:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts
      - name: Smoke check test deployment on server
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          EXPECTED_VERSION: ${{ env.IMAGE_TAG }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "
            EXPECTED_VERSION='$EXPECTED_VERSION' python3 - <<'PY'
          import json
          import os
          import urllib.request

          base_url = 'http://127.0.0.1:1234'
          expected_version = os.environ['EXPECTED_VERSION']
          paths = ['/api/health', '/', '/menu', '/notices']

          for path in paths:
              request = urllib.request.Request(
                  base_url + path,
                  headers={'User-Agent': 'gshsapp-ci-smoke-check'},
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  body = response.read()
                  status = response.status

              if status < 200 or status >= 400:
                  raise SystemExit(f'{path} returned status {status}')

              if path == '/api/health':
                  payload = json.loads(body.decode('utf-8'))
                  if payload.get('ok') is not True:
                      raise SystemExit(f'Health endpoint returned unhealthy payload: {payload}')
                  if payload.get('service') != 'gshsapp':
                      raise SystemExit(f'Unexpected service name: {payload}')
                  if payload.get('version') != expected_version:
                      raise SystemExit(
                          f'Health endpoint version mismatch: expected {expected_version}, got {payload.get(\"version\")}'
                      )
          PY
          "
